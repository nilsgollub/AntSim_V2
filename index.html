<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AntSim V3</title>
</head>


<body>
  <canvas id="gameCanvas"></canvas>

  <div id="nest-container">
    <canvas id="nestCanvas"></canvas>

    <div id="nest-overlay">
      <div id="stats-panel">
        <div class="stat" id="fps">FPS: 0</div>
        <div class="stat" id="popStat">Pop: 0</div>
        <div class="stat" id="foodStat">P: 0 | S: 0</div>
        <div class="stat" id="queenStat">Queen Age: 0m 0s</div>
        <div class="stat" id="version" style="font-size: 9px; opacity: 0.7;">v0.1.0</div>
      </div>

      <div id="controls-top">
        <div class="control-group">
          <label>Speed: <span id="speedVal">1x</span></label>
          <input type="range" id="speedRange" min="0" max="10" value="1" step="0.1">
        </div>
        <div class="control-group">
          <input type="checkbox" id="pheromoneToggle">
          <label for="pheromoneToggle" style="cursor: pointer;">Pheromones</label>
        </div>
      </div>

      <div id="controls-bottom">
        <div class="control-group">
          <select id="qualitySelect">
            <option value="ULTRA_LOW">Ultra Low</option>
            <option value="LOW">Low</option>
            <option value="MEDIUM">Medium</option>
            <option value="HIGH" selected>High</option>
            <option value="ULTRA">Ultra</option>
          </select>
        </div>
        <div class="control-group">
          <button id="restartBtn">Restart</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
