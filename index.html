<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AntSim V3</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #111;
      color: #eee;
      font-family: sans-serif;
      display: flex;
      height: 100dvh;
      min-height: -webkit-fill-available;
    }


    #gameCanvas {
      display: block;
      width: 80vw;
      height: 100dvh;
    }

    /* Nest Container - Holds Canvas and UI */
    #nest-container {
      position: relative;
      width: 20vw;
      height: 100dvh;
      border-left: 4px solid #333;
      box-sizing: border-box;
      background: #1a1a1a;
    }

    #nestCanvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* Nest Overlay UI - Relative to Container */
    #nest-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #stats-panel {
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 11px;
      color: #aaa;
      pointer-events: none;
      background: rgba(0, 0, 0, 0.4);
      padding: 5px;
      border-radius: 4px;
    }

    #controls-top {
      position: absolute;
      top: 10px;
      right: 10px;
      text-align: right;
      pointer-events: auto;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 5px;
    }

    #controls-bottom {
      position: absolute;
      bottom: 10px;
      right: 10px;
      text-align: right;
      pointer-events: auto;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 5px;
    }

    .control-group {
      background: rgba(0, 0, 0, 0.6);
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
    }

    .stat {
      margin-bottom: 2px;
    }

    button {
      cursor: pointer;
      padding: 4px 8px;
      background: #444;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 11px;
    }

    button:hover {
      background: #666;
    }

    input[type=range] {
      width: 80px;
      vertical-align: middle;
    }

    select {
      background: #333;
      color: #fff;
      border: 1px solid #555;
      border-radius: 3px;
      font-size: 11px;
    }

    /* Responsive Layout */
    @media (orientation: portrait) {
      body {
        flex-direction: column;
      }

      #gameCanvas {
        width: 100vw;
        height: 80dvh;
      }

      #nest-container {
        width: 100vw;
        height: 20dvh;
        border-left: none;
        border-top: 4px solid #333;
      }

      #controls-top {
        top: 5px;
        right: 5px;
        flex-direction: row;
      }

      #controls-bottom {
        bottom: 25px;
        right: 5px;
        flex-direction: row;
      }
    }
  </style>
</head>

<body>
  <canvas id="gameCanvas"></canvas>

  <div id="nest-container">
    <canvas id="nestCanvas"></canvas>

    <div id="nest-overlay">
      <div id="stats-panel">
        <div class="stat" id="fps">FPS: 0</div>
        <div class="stat" id="popStat">Pop: 0</div>
        <div class="stat" id="foodStat">P: 0 | S: 0</div>
        <div class="stat" id="queenStat">Queen Age: 0m 0s</div>
        <div class="stat" id="version" style="font-size: 9px; opacity: 0.7;">v0.1.0</div>
      </div>

      <div id="controls-top">
        <div class="control-group">
          <label>Speed: <span id="speedVal">1x</span></label>
          <input type="range" id="speedRange" min="0" max="10" value="1" step="0.1">
        </div>
        <div class="control-group">
          <input type="checkbox" id="pheromoneToggle">
          <label for="pheromoneToggle" style="cursor: pointer;">Pheromones</label>
        </div>
      </div>

      <div id="controls-bottom">
        <div class="control-group">
          <select id="qualitySelect">
            <option value="LOW">Low</option>
            <option value="MEDIUM">Medium</option>
            <option value="HIGH">High</option>
            <option value="ULTRA" selected>Ultra</option>
          </select>
        </div>
        <div class="control-group">
          <button id="restartBtn">Restart</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
