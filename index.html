<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AntSim V3</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #111;
      color: #eee;
      font-family: sans-serif;
      display: flex;
    }

    #gameCanvas {
      display: block;
      width: 75vw;
      height: 100vh;
    }

    #nestCanvas {
      display: block;
      width: 25vw;
      height: 100vh;
      background: #1a1a1a;
      border-left: 4px solid #333;
    }

    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      pointer-events: none;
    }

    #controls {
      position: absolute;
      top: 10px;
      right: 26vw;
      /* Moved left of nest view */
      background: rgba(0, 0, 0, 0.5);
      padding: 10px;
      border-radius: 8px;
      pointer-events: auto;
    }

    #legend {
      position: absolute;
      bottom: 10px;
      left: 10px;
      background: rgba(0, 0, 0, 0.8);
      padding: 10px;
      border-radius: 8px;
      pointer-events: none;
    }

    .item {
      display: flex;
      align-items: center;
      margin-bottom: 4px;
      font-size: 12px;
    }

    .color {
      width: 12px;
      height: 12px;
      display: inline-block;
      margin-right: 8px;
      border-radius: 50%;
    }

    .stat {
      margin-bottom: 5px;
    }

    button {
      cursor: pointer;
      padding: 5px 10px;
      background: #444;
      color: #fff;
      border: none;
      border-radius: 4px;
    }

    button:hover {
      background: #666;
    }

    input[type=range] {
      width: 100px;
    }

    /* Responsive Layout */
    @media (orientation: portrait) {
      body {
        flex-direction: column;
      }

      #gameCanvas {
        width: 100vw;
        height: 75vh;
      }

      #nestCanvas {
        width: 100vw;
        height: 25vh;
        border-left: none;
        border-top: 4px solid #333;
      }

      #controls {
        top: auto;
        bottom: 26vh;
        /* Just above nest view */
        right: 10px;
        left: auto;
      }

      #legend {
        bottom: 26vh;
        /* Just above nest view */
      }
    }
  </style>
</head>

<body>
  <canvas id="gameCanvas"></canvas>
  <canvas id="nestCanvas"></canvas>

  <div id="ui">
    <div class="stat" id="fps">FPS: 0</div>
    <div class="stat" id="popStat">Population: 0</div>
    <div class="stat" id="foodStat">Protein: 0</div>
  </div>

  <div id="controls">
    <h3>Controls</h3>
    <div>
      <label>Speed: <span id="speedVal">1x</span></label>
      <input type="range" id="speedRange" min="0" max="10" value="1" step="0.1">
    </div>
    <div style="margin-top: 10px;">
      <label>Quality:</label>
      <select id="qualitySelect">
        <option value="LOW">Low (Fast)</option>
        <option value="MEDIUM">Medium</option>
        <option value="HIGH" selected>High</option>
        <option value="ULTRA">Ultra (Extreme)</option>
      </select>
    </div>
    <div style="margin-top: 10px;">
      <input type="checkbox" id="pheromoneToggle">
      <label for="pheromoneToggle" style="cursor: pointer;">Show Pheromones</label>
    </div>
    <br>
    <button id="restartBtn">Restart Simulation</button>
  </div>



  <script type="module" src="/src/main.ts"></script>
</body>

</html>
